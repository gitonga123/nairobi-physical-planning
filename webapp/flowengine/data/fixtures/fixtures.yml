    top_article: "<section class=\"container\">\r\n<div class=\"icon-top-title aligncenter sixteen columns\">\r\n<hr class=\"vertical-space1\" />\r\n<h3><strong>Welcome to the Ministry of Software and Workflow Development.</strong></h3>\r\n\r\n<h3 class=\"slight\">You can now access the Ministry&#39;s services using your eCitizen account.</h3>\r\n\r\n<h6><strong>Apply and pay for your Ministry of Software and Workflow Development licenses online.</strong></h6>\r\n<br />\r\n<a class=\"btn btn-warning\" href=\"/index.php?id=1\">Learn More about eCitizen</a>\r\n\r\n<hr class=\"vertical-space2\" /></div>\r\n<!-- /end-two columns --></section>\r\n\r\n<section class=\"blox dark\">\r\n<div class=\"container\">\r\n<div class=\"sixteen columns\">\r\n<hr class=\"vertical-space1\" /><!-- Start - Icon Boxes -->\r\n<div class=\"one_third\">\r\n<div class=\"icon-box icon-colorx\">\r\n<div class=\"icomoon-checkmark-3 \">&nbsp;</div>\r\n\r\n<h4><strong><a href=\"http://account.ecitizen.go.ke/register\">Sign Up</a></strong></h4>\r\n\r\n<p>Take a few seconds to get yourself signed up. All you need is your ID number.</p>\r\n</div>\r\n</div>\r\n\r\n<div class=\"one_third\">\r\n<div class=\"icon-box icon-colorx\">\r\n<div class=\"icomoon-unlocked-2\">&nbsp;</div>\r\n\r\n<h4><strong><a href=\"http://account.ecitizen.go.ke/login\">Sign In</a></strong></h4>\r\n\r\n<p>Sign into your account and get access to all the government services you need</p>\r\n</div>\r\n</div>\r\n\r\n<div class=\"one_third column-last\">\r\n<div class=\"icon-box icon-colorx\">\r\n<div class=\"icomoon-laptop \">&nbsp;</div>\r\n\r\n<h4><strong><a href=\"http://account.ecitizen.go.ke/register\">Apply and Pay online</a></strong></h4>\r\n\r\n<p>You can now pay online and avoid queues at the bank.</p>\r\n</div>\r\n</div>\r\n</div>\r\n</div>\r\n</section>"
    menu_title: Home
